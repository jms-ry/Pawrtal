name: Tests

on:
  push:
    branches: ["**"]   # run on push to any branch
  pull_request:
    branches: ["**"]   # also run on PRs, in case you open one later

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: "12341234"
          POSTGRES_DB: pawrtal_testing
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, pdo, pdo_pgsql, pgsql, bcmath, ctype, fileinfo, openssl, tokenizer, xml
          coverage: none

      - name: Copy .env
        run: cp .env.example .env

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Generate app key
        run: php artisan key:generate

      - name: Wait for Postgres
        run: |
          until pg_isready -h 127.0.0.1 -p 5432 -U postgres; do
            echo "Waiting for postgres..."
            sleep 2
          done

      - name: Run migrations
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: pawrtal_testing
          DB_USERNAME: postgres
          DB_PASSWORD: "12341234"
        run: php artisan migrate --force

      - name: Verify DB connection and tables
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: pawrtal_testing
          DB_USERNAME: postgres
          DB_PASSWORD: "12341234"
        run: |
          php artisan tinker --execute="echo DB::connection()->getDatabaseName();"
          PGPASSWORD=12341234 psql -h 127.0.0.1 -U postgres -d pawrtal_testing -c "\dt"

      - name: Clear config cache
        run: php artisan config:clear

      - name: Run test suite
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: pawrtal_testing
          DB_USERNAME: postgres
          DB_PASSWORD: "12341234"
        run: php artisan test